server:
  port: 8080

spring:
  application:
    name: ecommerce-platform
  datasource:
    url: jdbc:postgresql://localhost:5432/ecommerce
    username: ecommerce
    password: ecommerce
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379

app:
  jwt:
    secret: ${JWT_SECRET:dev_only_secret_change_in_prod_min_256_bits_long_random_string_xyz}
    access-ttl: PT15M
    refresh-ttl: P7D
  login:
    rate-limit:
      max-requests: 5      # per IP per window; override for load tests: --app.login.rate-limit.max-requests=200
      window-seconds: 60

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
