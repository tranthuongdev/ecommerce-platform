spring:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        show_sql: false
        generate_statistics: true
        session:
          events:
            log:
              LOG_QueryAfterTime: 30
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: test_jwt_secret_for_auth_module_tests_min_256_bits_long_xxxx
    access-ttl: PT15M
    refresh-ttl: P7D
